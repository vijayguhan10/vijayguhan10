name: GitHub-Profile-3D-Contrib

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-github-profile-3d-contrib

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: yoshi389111/github-profile-3d-contrib@latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}

      - name: Make SVG animations loop
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(profile-3d-contrib/*animate*.svg)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No animated SVGs found; skipping."
            exit 0
          fi
          for f in "${files[@]}"; do
            sed -i 's/repeatCount="1"/repeatCount="indefinite"/g' "$f"
          done

      - name: Upload generated SVGs (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: profile-3d-contrib
          path: profile-3d-contrib/*.svg
